services:
  web-app:
    build:
      context: .
      dockerfile: apps/web-app/Dockerfile
    depends_on:
      api-service:
        condition: service_healthy
    environment:
      API_SERVICE_BASE_URL: ${API_SERVICE_BASE_URL:-http://api-service:8000}
      NEXT_PUBLIC_DEFAULT_SIMULATION_RUN_ID: ${NEXT_PUBLIC_DEFAULT_SIMULATION_RUN_ID:-}
      PORT: 3000
    ports:
      - "${WEB_APP_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  api-service:
    image: courtroom-simulation-api-service:local
    build:
      context: .
      dockerfile: apps/api-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - apps/api-service/.env
      - apps/agent-service/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/courtroom_simulation}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    ports:
      - "${API_SERVICE_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/openapi.json')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker-llm:
    image: courtroom-simulation-api-service:local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - apps/api-service/.env
      - apps/agent-service/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/courtroom_simulation}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    command:
      [
        "sh",
        "-c",
        "python -m api_service.worker --url \"$$REDIS_URL\" simulation_llm",
      ]

  worker-tts:
    image: courtroom-simulation-api-service:local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - apps/api-service/.env
      - apps/agent-service/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/courtroom_simulation}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    command:
      [
        "sh",
        "-c",
        "python -m api_service.worker --url \"$$REDIS_URL\" simulation_tts",
      ]

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-courtroom_simulation}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-courtroom_simulation}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres-data:
