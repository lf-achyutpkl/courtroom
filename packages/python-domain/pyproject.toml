[project]
name = "courtroom-domain"
version = "0.1.0"
description = "Shared Python domain models for the courtroom simulator."
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.13.4",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.ruff]
line-length = 88
indent-width = 4

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
